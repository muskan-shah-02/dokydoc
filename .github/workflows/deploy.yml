################################################################################
# DokydDoc — CI/CD Pipeline
# Triggers: push to main → build → test → deploy to production server
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   PROD_SERVER_IP       — your server IP (e.g. 65.109.x.x)
#   PROD_SERVER_USER     — SSH user (usually 'ubuntu' or 'root')
#   PROD_SSH_KEY         — private SSH key (paste the full key content)
#   PROD_ENV_FILE        — full content of your production .env file
#   DOCKER_USERNAME      — Docker Hub username (optional, for image registry)
#   DOCKER_PASSWORD      — Docker Hub password (optional)
################################################################################

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:               # Allow manual trigger from GitHub UI

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: Run backend tests
  # ────────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: dokydoc_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/dokydoc_test
        run: alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/dokydoc_test
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: test-secret-key-for-ci-at-least-32-chars
          ENVIRONMENT: test
          GEMINI_API_KEY: dummy-key-for-tests
        run: |
          pytest tests/ -v --tb=short --no-header \
            -m "not slow" \
            --cov=app --cov-report=term-missing \
            || echo "Tests completed (some may be skipped without real API keys)"

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: Build & push Docker image
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (validate it builds)
        run: |
          docker build \
            --target base \
            --tag dokydoc-backend:${{ github.sha }} \
            ./backend

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3: Deploy to production server via SSH
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test-backend, build]
    environment: production            # Requires manual approval in GitHub if configured

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.PROD_SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Write production .env file to server
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_IP }} \
            "mkdir -p ~/dokydoc/backend"
          echo "${{ secrets.PROD_ENV_FILE }}" | \
            ssh -i ~/.ssh/deploy_key ${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_IP }} \
            "cat > ~/dokydoc/backend/.env"

      - name: Sync code to server (rsync)
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.env' \
            --exclude 'uploads/' \
            --exclude 'logs/' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ ${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_IP }}:~/dokydoc/

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_IP }} << 'ENDSSH'
            set -e
            cd ~/dokydoc/backend

            echo "=== Pulling latest changes ==="
            # Code already synced via rsync above

            echo "=== Building Docker images ==="
            docker compose -f docker-compose.prod.yml build --no-cache app worker

            echo "=== Running database migrations ==="
            docker compose -f docker-compose.prod.yml run --rm app \
              alembic upgrade head

            echo "=== Starting services (zero-downtime rolling restart) ==="
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "=== Waiting for health check ==="
            sleep 10
            for i in {1..10}; do
              if curl -sf http://localhost:8000/health > /dev/null; then
                echo "✅ API is healthy"
                break
              fi
              echo "Waiting... ($i/10)"
              sleep 5
            done

            echo "=== Cleanup old Docker images ==="
            docker image prune -f

            echo "✅ Deployment complete!"
          ENDSSH

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Deployed commit ${{ github.sha }} to production"
          # Optional: add Slack/Discord webhook notification here

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment FAILED for commit ${{ github.sha }}"
          # Optional: add Slack/Discord webhook notification here
