################################################################################
# Nginx Production Config — DokydDoc
# Handles: SSL termination, rate limiting, reverse proxy to FastAPI
################################################################################

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ── Basics ───────────────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens off;                         # Hide nginx version

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main buffer=32k flush=5m;
    error_log  /var/log/nginx/error.log warn;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # ── Rate Limiting ─────────────────────────────────────────────────────────
    # 10 requests/second per IP — burst up to 20, then queue up to 10 more
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=3r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── File Upload Size ──────────────────────────────────────────────────────
    client_max_body_size 100M;                 # Allow large file uploads
    client_body_timeout 60s;
    client_header_timeout 60s;

    # ── Proxy Timeouts ────────────────────────────────────────────────────────
    # Long timeouts for AI generation (can take 45–90 seconds)
    proxy_connect_timeout 10s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;
    send_timeout          120s;

    # ── Upstream: FastAPI Backend ─────────────────────────────────────────────
    upstream fastapi_backend {
        server app:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS Redirect ────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;                         # Replace _ with your domain

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;             # For Let's Encrypt renewal
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Main Server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name yourdomain.com www.yourdomain.com;   # ← CHANGE THIS

        # ── SSL Certificates (Let's Encrypt / Certbot) ──
        ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

        # ── SSL Hardening ──
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;

        # ── Security Headers ──
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── Connection limits ──
        limit_conn conn_limit 50;

        # ── Health check (no rate limit) ──────────────────────────────────────
        location /health {
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── API Routes ────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS headers (handled by FastAPI, but add backup)
            proxy_hide_header Access-Control-Allow-Origin;
        }

        # ── Auth routes — stricter rate limit ────────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── API Docs (disable in prod or restrict access) ─────────────────────
        location /docs {
            # Uncomment to restrict to your IP only:
            # allow YOUR_IP;
            # deny all;
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /redoc {
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
        }

        # ── Static file uploads serving (shared volume) ───────────────────────
        location /uploads/ {
            alias /var/www/uploads/;
            expires 7d;
            add_header Cache-Control "public, no-transform";
            add_header X-Content-Type-Options nosniff;
        }

        # ── Frontend — if hosting Next.js here (or remove if using Vercel) ───
        location / {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
